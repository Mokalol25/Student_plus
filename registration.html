<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student+</title>
    <link rel="stylesheet" href="./css/registration/registration.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
            <div class="container">
                <ul class="header_list">
                    <li class="header_item">
                        <div class="header_logo_box">
                            <svg class="header_logo">
                                <use href="./img/logo.svg"></use>
                            </svg>
                        </div>
                    </li>
                    <li class="header_item">
                        <h3 class="header_variants">Послуги
                            <span>
                                <img class="header_arrow_down_1" src="./img/header/arrow-down.svg" alt="arrow-down">
                            </span>
                        </h3>
                    </li>
                    <li class="header_item">
                        <h3 class="header_variants">Що таке Студент+?</h3>
                    </li>
                    <li class="header_item">
                        <h3 class="header_variants">Новини</h3>
                    </li>
                    <li class="header_item">
                        <h3 class="header_variants">Про нас
                            <span>
                                <img class="header_arrow_down_2" src="./img/header/arrow-down.svg" alt="arrow-down">
                            </span>
                        </h3>
                    </li>
                    <li class="header_item">
                        <ul class="header_chosse_list">
                            <li class="header_chosse_item">
                                <button class="header_sign_up_button">Увійти</button>
                            </li>
                            <li class="header_chosse_item">
                                <button class="header_sing_in_button">Зареєструватись</button>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </header>

        <section class="log_in">
            <div class="log_in_description">
                <h1 class="log_in_title"><span class="highlight">Увійдіть</span> на<br>Студент<span class="highlight">+</span></h1>
                <p class="log_in_text">Доступність послуг та кожен документ<br>на кінчиках пальців</p>
            </div>
            
            <div class="log_in_sequence">


                <div class="log_in_choose">
                    <div class="log_in_choose_box">
                        <h3 class="log_in_choose_title">Оберіть роль</h3>
                        <ul class="log_in_choose_list">
                            <li class="log_in_choose_item">
                                <img class="log_in_choose_student_img" src="./img/registration/header/Student_img.png" alt="Студент">
                                <h4 class="log_in_choose_student_title">Студент</h4>
                            </li>
                            <li class="log_in_choose_item">
                                <img class="log_in_choose_worker_img" src="./img/registration/header/Worker_img.png" alt="Працівник">
                                <h4 class="log_in_choose_worker_title">Працівник</h4>
                            </li>
                        </ul>
                        <div class="log_in_choose_other_box">
                            <p class="log_in_choose_other_box_text">Обрати інше</p>
                        </div>
                    </div>
                </div>


                <div class="log_in_sing_up_blanc">
                    <div class="log_in_title_box">
                        <svg class="log_in_title_box_arrow_svg">
                            <use class="log_in_title_box_arrow" href="./img/log_in/header/arrow-back.svg"></use>
                        </svg>
                        <h3 class="log_in_title_box_title">Вхід</h3>
                    </div>
                    <div class="log_in_sign_up_box">
                        <ul class="log_in_sign_up_box_list">
                            <li class="log_in_sign_up_box_item">
                                <label for="log_in_email">Email</label>
                                <input class="log_in_email_input" type="email" id="log_in_email" name="email" placeholder="Введіть вашу електронну пошту">
                            </li>
                            <li class="log_in_sign_up_box_item">
                                <label for="log_in_password">Пароль</label>
                                <input class="log_in_password_input" type="password" id="log_in_password" name="password" placeholder="Введіть ваш пароль">
                            </li>
                        </ul>
                    </div>
                    <button class="log_in_sing_up_button">Увійти</button>
                </div>
            </div>
        </section>
</body>
</html>
