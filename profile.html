<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Особистий кабінет | Студент+</title>
    <!-- Підключаємо шрифт Inter, як у всьому проекті -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <a href="index.html">
          <img src="img/logo.svg" alt="Student Plus Logo" />
        </a>
      </div>
      <nav class="nav">
        <a href="index.html">Послуги <span class="arrow-icon"></span></a>
        <a href="#">Що таке Студент+?</a>
        <a href="#">Новини</a>
        <a href="#">Про нас <span class="arrow-icon"></span></a>
      </nav>
      <div class="profile-badge">
        <span class="profile-text">Ваш профіль</span>
        <div class="avatar-circle">
          <!-- Заміни на реальне фото, якщо є в img/gen/ -->
          <img src="img/gen/avatar.png" alt="M" class="avatar-img" />
        </div>
      </div>
    </header>

    <main class="profile-container">
      <section class="welcome-header">
        <h1>Вітаємо, Згоба Марко Ігорович!</h1>
        <div class="orange-line"></div>
        <p class="subtitle">Ви — студент інституту ІКТА</p>
      </section>

      <section class="services-wrapper">
        <!-- Твої помаранчеві кубики зліва -->
        <img
          src="img/gen/orange-blocks.png"
          class="profile-decor-left"
          alt=""
        />

        <div class="services-main-card">
          <h2>Доступні послуги</h2>

          <div class="services-grid">
            <!-- Картка 1 -->
            <div class="service-item">
              <div class="service-top">
                <h3>Замовити довідку з місця навчання</h3>
              </div>
              <div class="service-bottom">
                <p>Час виконання:<br />1 - 3 робочі дні</p>
                <a href="#" class="service-arrow">➔</a>
              </div>
            </div>

            <!-- Картка 2 -->
            <div class="service-item">
              <div class="service-top">
                <h3>Державний грант на навчання</h3>
              </div>
              <div class="service-bottom">
                <p>Очікує підписання</p>
                <a href="#" class="service-arrow">➔</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
