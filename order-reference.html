<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Замовити довідку | Студент+</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/order.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <a href="index.html"><img src="img/logo.svg" alt="Student Plus" /></a>
      </div>
      <nav class="nav">
        <a href="profile.html">Послуги <span class="arrow-icon"></span></a>
        <a href="#">Що таке Студент+?</a>
        <a href="#">Новини</a>
        <a href="#">Про нас <span class="arrow-icon"></span></a>
      </nav>
      <div class="profile-badge" id="profileBtn">
        <span class="profile-text">Ваш профіль</span>
        <div class="avatar-circle">
          <img src="img/gen/avatar.png" alt="Avatar" />
        </div>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="profile.html" class="dropdown-item"
            ><div class="dot"></div>
            Перейти в профіль</a
          >
          <a href="#" class="dropdown-item"
            ><div class="dot"></div>
            Мої послуги</a
          >
          <hr class="dropdown-divider" />
          <a href="index.html" class="dropdown-item exit"
            ><div class="dot"></div>
            Вийти</a
          >
        </div>
      </div>
    </header>

    <main class="order-container">
      <section class="order-main-card">
                
        <img src="img/gen/orange-blocks.png" class="news-decor" alt="decor" />
        <img src="img/gen/orange-blocks.png" class="news-decor-right" alt="decor" />

        <h1>Замовити довідку з місця навчання</h1>
        <p class="subtitle">Вкажіть причину оформлення довідки</p>

        <form class="order-form">
          <input
            type="text"
            placeholder="в школу, на Леокарт"
            class="reason-input"
          />
          <button type="submit" class="btn-submit">Замовити</button>
        </form>
      </section>

      <div class="decor-blocks-right">
        <div class="orange-block"></div>
        <div class="orange-block"></div>
        <div class="orange-block"></div>
      </div>
    </main>
    <script>
      const profileBtn = document.getElementById("profileBtn");
      const dropdownMenu = document.getElementById("dropdownMenu");

      // Відкриття/закриття при кліку
      profileBtn.addEventListener("click", function (e) {
        e.stopPropagation(); // Щоб клік не йшов далі
        dropdownMenu.classList.toggle("active");
      });

      // Закриття, якщо клікнути в будь-якому іншому місці екрана
      document.addEventListener("click", function () {
        dropdownMenu.classList.remove("active");
      });
    </script>
  </body>
</html>
